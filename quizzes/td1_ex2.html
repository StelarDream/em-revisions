<script type="module">
import { QuizEngine } from '../scripts/quiz.js';
// ═══════════════════════════════════════════════════════════
//  TD1 — Exercice 2 : Champs et lignes de champ
//  Trois champs cartésiens :
//    A = (-y, x, 0)   — rotationnel pur
//    B = (x, y, 0)    — divergent pur
//    C = (0, a|x|, 0) — ni l'un ni l'autre (discontinuité)
// ═══════════════════════════════════════════════════════════

const CTX_ABC = `
  Trois champs vectoriels en coordonnées cartésiennes :
  $$\\vec{A} = -y\\,\\hat{u}_x + x\\,\\hat{u}_y \\qquad
    \\vec{B} = x\\,\\hat{u}_x + y\\,\\hat{u}_y \\qquad
    \\vec{C} = a|x|\\,\\hat{u}_y$$
`;

const questions = [

  // ── Q1 · Numeric ──────────────────────────────────────────
  {
    type: "numeric",
    context: CTX_ABC,
    question: "Calculez $\\vec{\\nabla}\\cdot\\vec{A}$.",
    hint: "md:$\\vec{\\nabla}\\cdot\\vec{A} = \\partial_x A_x + \\partial_y A_y + \\partial_z A_z$. Ici $A_x = -y$, $A_y = x$.",
    answer: 0,
    explanation: "$\\vec{\\nabla}\\cdot\\vec{A} = \\dfrac{\\partial(-y)}{\\partial x} + \\dfrac{\\partial x}{\\partial y} + 0 = 0 + 0 = 0$. Le champ $\\vec{A}$ est solénoïdal (à flux conservatif)."
  },

  // ── Q2 · Numeric ──────────────────────────────────────────
  {
    type: "numeric",
    context: CTX_ABC,
    question: "Calculez la composante $z$ du rotationnel de $\\vec{A}$ : $(\\vec{\\nabla}\\times\\vec{A})_z$.",
    hint: "md:$(\\vec{\\nabla}\\times\\vec{A})_z = \\partial_x A_y - \\partial_y A_x$. Ici $A_y = x$ et $A_x = -y$.",
    answer: 2,
    explanation: "$(\\vec{\\nabla}\\times\\vec{A})_z = \\dfrac{\\partial A_y}{\\partial x} - \\dfrac{\\partial A_x}{\\partial y} = \\dfrac{\\partial x}{\\partial x} - \\dfrac{\\partial(-y)}{\\partial y} = 1-(-1) = 2$. Le rotationnel de $\\vec{A}$ est $2\\,\\hat{u}_z$ — constant, uniforme."
  },

  // ── Q3 · MCQ ─────────────────────────────────────────────
  {
    type: "mcq",
    context: CTX_ABC,
    question: "Quelles sont les lignes de champ de $\\vec{A} = -y\\,\\hat{u}_x + x\\,\\hat{u}_y$ ?",
    options: [
      "Des cercles centrés sur l'axe $Oz$",
      "Des droites radiales issues de l'origine",
      "Des paraboles",
      "Des hyperboles"
    ],
    answer: "Des cercles centrés sur l'axe $Oz$",
    explanation: "La condition de ligne de champ est $\\dfrac{dx}{A_x} = \\dfrac{dy}{A_y}$, soit $\\dfrac{dx}{-y} = \\dfrac{dy}{x}$, d'où $x\\,dx + y\\,dy = 0 \\Rightarrow x^2 + y^2 = \\text{cte}$. Ce sont des cercles — $\\vec{A}$ représente une rotation uniforme."
  },

  // ── Q4 · MCQ ─────────────────────────────────────────────
  {
    type: "mcq",
    context: CTX_ABC,
    question: "Calculez $\\vec{\\nabla}\\cdot\\vec{B}$ et $\\vec{\\nabla}\\times\\vec{B}$.",
    options: [
      "$\\vec{\\nabla}\\cdot\\vec{B} = 2$, $\\vec{\\nabla}\\times\\vec{B} = \\vec{0}$",
      "$\\vec{\\nabla}\\cdot\\vec{B} = 0$, $\\vec{\\nabla}\\times\\vec{B} = 2\\hat{u}_z$",
      "$\\vec{\\nabla}\\cdot\\vec{B} = 2$, $\\vec{\\nabla}\\times\\vec{B} = 2\\hat{u}_z$",
      "$\\vec{\\nabla}\\cdot\\vec{B} = 1$, $\\vec{\\nabla}\\times\\vec{B} = \\vec{0}$"
    ],
    answer: "$\\vec{\\nabla}\\cdot\\vec{B} = 2$, $\\vec{\\nabla}\\times\\vec{B} = \\vec{0}$",
    explanation: "$\\vec{\\nabla}\\cdot\\vec{B} = \\partial_x x + \\partial_y y = 2$. Pour le rotationnel : $(\\vec{\\nabla}\\times\\vec{B})_z = \\partial_x y - \\partial_y x = 0$. Donc $\\vec{B}$ est irrotationnel mais non solénoïdal — c'est un champ purement divergent (comme un champ électrique de charge uniforme)."
  },

  // ── Q5 · Conceptual ──────────────────────────────────────
  {
    type: "mcq",
    context: CTX_ABC,
    question: "Le champ $\\vec{C} = a|x|\\,\\hat{u}_y$ — que peut-on dire de son rotationnel ?",
    options: [
      "Il est nul partout",
      "Il est non nul et bien défini partout",
      "Il est non nul mais pas défini en $x=0$ (discontinuité de la dérivée)",
      "Il est nul sauf à l'origine"
    ],
    answer: "Il est non nul mais pas défini en $x=0$ (discontinuité de la dérivée)",
    explanation: "$(\\vec{\\nabla}\\times\\vec{C})_z = \\partial_x(a|x|) - 0 = a\\,\\text{sgn}(x)$ pour $x\\neq 0$. En $x=0$, la dérivée de $|x|$ n'est pas définie (au sens classique) — elle vaut $a\\,\\delta(x)$ au sens des distributions. Cela illustre qu'une discontinuité dans un champ génère un rotationnel singulier."
  },

  // ── Q6 · TF ──────────────────────────────────────────────
  {
    type: "tf",
    question: "Un champ à divergence nulle ($\\vec{\\nabla}\\cdot\\vec{F}=0$) est nécessairement aussi à rotationnel nul.",
    answer: "false",
    explanation: "Faux. Le champ $\\vec{A} = -y\\,\\hat{u}_x + x\\,\\hat{u}_y$ de cet exercice en est la preuve : $\\vec{\\nabla}\\cdot\\vec{A} = 0$ mais $\\vec{\\nabla}\\times\\vec{A} = 2\\hat{u}_z \\neq \\vec{0}$. Divergence et rotationnel sont des propriétés indépendantes."
  },

  // ── Q7 · TF ──────────────────────────────────────────────
  {
    type: "tf",
    question: "On peut vérifier $\\vec{\\nabla}\\cdot\\vec{A}$ par le théorème de Green-Ostrogradski : le flux de $\\vec{A}$ sortant d'un cube est égal à $\\iiint \\vec{\\nabla}\\cdot\\vec{A}\\,d\\tau = 0$.",
    answer: "true",
    explanation: "Puisque $\\vec{\\nabla}\\cdot\\vec{A} = 0$ partout, le théorème de Green-Ostrogradski garantit que le flux sortant de **toute** surface fermée est nul. On peut le vérifier directement sur un cube, un cylindre, ou toute surface : le flux entrant compense exactement le flux sortant."
  },

  // ── Q8 · MCQ ─────────────────────────────────────────────
  {
    type: "mcq",
    question: "Lequel de ces champs peut représenter un champ magnétostatique $\\vec{B}$ physiquement réalisable (i.e. vérifiant $\\vec{\\nabla}\\cdot\\vec{B}=0$) ?",
    options: [
      "$\\vec{F}_1 = x\\,\\hat{u}_x + y\\,\\hat{u}_y + z\\,\\hat{u}_z$",
      "$\\vec{F}_2 = -y\\,\\hat{u}_x + x\\,\\hat{u}_y$",
      "$\\vec{F}_3 = x\\,\\hat{u}_x + y\\,\\hat{u}_y$",
      "$\\vec{F}_4 = x^2\\,\\hat{u}_x + y^2\\,\\hat{u}_y + z^2\\,\\hat{u}_z$"
    ],
    answer: "$\\vec{F}_2 = -y\\,\\hat{u}_x + x\\,\\hat{u}_y$",
    explanation: "On vérifie $\\vec{\\nabla}\\cdot\\vec{F} = 0$ pour chaque champ. $\\vec{F}_1$ : $1+1+1=3\\neq 0$. $\\vec{F}_2$ : $0+0=0$ ✓. $\\vec{F}_3$ : $1+1=2\\neq 0$. $\\vec{F}_4$ : $2x+2y+2z\\neq 0$ en général. Seul $\\vec{F}_2$ est solénoïdal."
  },

];

QuizEngine.loadQuiz("td1_ex2", questions, `md:
## Exercice 2 — Champs et lignes de champs

On considère les trois champs vectoriels en coordonnées cartésiennes :

$$\\vec{A}(\\vec{r}) = -y\\,\\hat{u}_x + x\\,\\hat{u}_y \\qquad \\vec{B}(\\vec{r}) = x\\,\\hat{u}_x + y\\,\\hat{u}_y \\qquad \\vec{C}(\\vec{r}) = a|x|\\,\\hat{u}_y$$

**a)** Rappeler l'expression des opérateurs divergence et rotationnel en coordonnées cartésiennes.

**b)** Calculer la divergence et le rotationnel de chacun des trois champs $\\vec{A}$, $\\vec{B}$, $\\vec{C}$.

**c)** Quelle relation vérifie un petit élément $d\\vec{\\ell}$ d'une ligne de champ avec le champ correspondant ?

**d)** En déduire et représenter les lignes de champ de chacun des trois vecteurs.

**e)** Retrouver grâce aux théorèmes de Green-Ostrogradski et Stokes les résultats de la question **b)**.
`, { setsFile: 'config/token_sets.json', normFile: 'config/norm_rules.json' });
</script>
