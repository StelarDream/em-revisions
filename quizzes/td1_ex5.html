  <script type="module">
    import { QuizEngine } from '/em-revisions/scripts/quiz.js';
    // ═══════════════════════════════════════════════════════════
    //  TD1 — Exercice 5 : Potentiel et champ électrostatique
    //  Partie 1 : V(z) linéaire par morceaux (condensateur plan)
    //  Partie 2 : V(r) sphérique (sphère uniformément chargée)
    // ═══════════════════════════════════════════════════════════

    const CTX1 = `
  Potentiel scalaire défini par morceaux :
  $$V(z) = \\begin{cases} 0 & z \\leq 0 \\\\ V_0\\,\\dfrac{z}{d} & 0 \\leq z \\leq d \\\\ V_0 & z \\geq d \\end{cases}$$
`;

    const CTX2 = `
  Potentiel sphérique :
  $$V(r) = \\begin{cases} \\dfrac{\\rho}{6\\varepsilon_0}(3R^2 - r^2) & r \\leq R \\\\ \\dfrac{\\rho R^3}{3\\varepsilon_0\\,r} & r \\geq R \\end{cases}$$
`;

    const questions = [

      // ── Q1 · MCQ ─────────────────────────────────────────────
      {
        type: "mcq",
        context: CTX1,
        question: "Que vaut le laplacien $\\Delta V$ pour $0 < z < d$ ?",
        options: [
          "$0$",
          "$V_0/d$",
          "$V_0/d^2$",
          "$-V_0/d$"
        ],
        answer: "$0$",
        explanation: "Dans la zone $0 < z < d$, $V = V_0 z/d$, donc $\\frac{dV}{dz} = V_0/d$ (constante) et $\\frac{d^2V}{dz^2} = 0$. Le laplacien est nul : cela signifie qu'il n'y a pas de charge volumique dans cet intervalle — c'est l'espace entre les armatures d'un condensateur plan."
      },

      // ── Q2 · MCQ ─────────────────────────────────────────────
      {
        type: "mcq",
        context: CTX1,
        question: "Quel est le champ électrique $\\vec{E}$ pour $0 < z < d$ ?",
        options: [
          "$\\vec{E} = -\\dfrac{V_0}{d}\\hat{u}_z$",
          "$\\vec{E} = \\dfrac{V_0}{d}\\hat{u}_z$",
          "$\\vec{E} = -\\dfrac{V_0}{d^2}\\hat{u}_z$",
          "$\\vec{E} = 0$"
        ],
        answer: "$\\vec{E} = -\\dfrac{V_0}{d}\\hat{u}_z$",
        explanation: "$\\vec{E} = -\\vec{\\nabla}V = -\\frac{dV}{dz}\\hat{u}_z = -\\frac{V_0}{d}\\hat{u}_z$. Le champ est uniforme, dirigé de $z=d$ (haut potentiel $V_0$) vers $z=0$ (potentiel nul). C'est exactement le champ dans un condensateur plan."
      },

      // ── Q3 · TF ──────────────────────────────────────────────
      {
        type: "tf",
        context: CTX1,
        question: "Le rotationnel de $\\vec{E}$ est nul partout, y compris aux interfaces $z=0$ et $z=d$.",
        answer: "true",
        explanation: "$\\vec{E}$ est uniforme selon $\\hat{u}_z$ (partout, même en $z=0$ et $z=d$ en tenant compte des discontinuités). Un champ de la forme $\\vec{E} = f(z)\\hat{u}_z$ a toujours $\\vec{\\nabla}\\times\\vec{E} = 0$ car $(\\vec{\\nabla}\\times\\vec{E})_x = \\partial_y E_z - \\partial_z E_y = 0$ et de même pour les autres composantes. C'est cohérent avec Maxwell-Faraday en statique."
      },

      // ── Q4 · MCQ ─────────────────────────────────────────────
      {
        type: "mcq",
        context: CTX1,
        question: "Quelles sont les symétries et invariances du champ $\\vec{E}$ issu de $V(z)$ ?",
        options: [
          "Invariance par translation selon $x$ et $y$ ; tout plan contenant $Oz$ est plan de symétrie",
          "Invariance par rotation autour de $Oz$ ; symétrie sphérique",
          "Invariance par translation selon $z$ uniquement",
          "Aucune symétrie particulière"
        ],
        answer: "Invariance par translation selon $x$ et $y$ ; tout plan contenant $Oz$ est plan de symétrie",
        explanation: "$V$ ne dépend que de $z$ ⟹ invariance par translation dans le plan $xy$ ⟹ $\\vec{E}$ ne dépend pas de $x$ ni de $y$. Tout plan contenant $Oz$ est plan de symétrie ⟹ $\\vec{E}\\parallel Oz$. Ces propriétés correspondent à une géométrie plane (condensateur, plan chargé infini)."
      },

      // ── Q5 · MCQ ─────────────────────────────────────────────
      {
        type: "mcq",
        context: CTX2,
        question: "Quel est le champ $\\vec{E}$ à l'intérieur de la sphère ($r < R$) ?",
        options: [
          "$\\vec{E} = \\dfrac{\\rho\\,r}{3\\varepsilon_0}\\hat{u}_r$",
          "$\\vec{E} = \\dfrac{\\rho\\,r^2}{3\\varepsilon_0}\\hat{u}_r$",
          "$\\vec{E} = -\\dfrac{\\rho\\,r}{3\\varepsilon_0}\\hat{u}_r$",
          "$\\vec{E} = \\dfrac{\\rho R^3}{3\\varepsilon_0 r^2}\\hat{u}_r$"
        ],
        answer: "$\\vec{E} = \\dfrac{\\rho\\,r}{3\\varepsilon_0}\\hat{u}_r$",
        explanation: "$\\vec{E} = -\\vec{\\nabla}V = -\\frac{dV}{dr}\\hat{u}_r$. Pour $r < R$ : $\\frac{dV}{dr} = \\frac{\\rho}{6\\varepsilon_0}(-2r) = -\\frac{\\rho r}{3\\varepsilon_0}$. Donc $\\vec{E} = \\frac{\\rho r}{3\\varepsilon_0}\\hat{u}_r$. Croît linéairement depuis le centre — résultat classique de Gauss pour une sphère uniformément chargée."
      },

      // ── Q6 · MCQ ─────────────────────────────────────────────
      {
        type: "mcq",
        context: CTX2,
        question: "Quel est le champ $\\vec{E}$ à l'extérieur ($r > R$) ?",
        options: [
          "$\\vec{E} = \\dfrac{\\rho R^3}{3\\varepsilon_0 r^2}\\hat{u}_r$",
          "$\\vec{E} = \\dfrac{\\rho R^3}{3\\varepsilon_0 r^3}\\hat{u}_r$",
          "$\\vec{E} = \\dfrac{\\rho r}{3\\varepsilon_0}\\hat{u}_r$",
          "$\\vec{E} = \\dfrac{\\rho R^2}{3\\varepsilon_0 r}\\hat{u}_r$"
        ],
        answer: "$\\vec{E} = \\dfrac{\\rho R^3}{3\\varepsilon_0 r^2}\\hat{u}_r$",
        explanation: "Pour $r > R$ : $\\frac{dV}{dr} = -\\frac{\\rho R^3}{3\\varepsilon_0 r^2}$. Donc $\\vec{E} = \\frac{\\rho R^3}{3\\varepsilon_0 r^2}\\hat{u}_r$. On peut l'écrire $\\vec{E} = \\frac{Q}{4\\pi\\varepsilon_0 r^2}\\hat{u}_r$ avec $Q = \\frac{4}{3}\\pi R^3 \\rho$ la charge totale — champ coulombien d'une charge ponctuelle. C'est le théorème de Gauss-Newton."
      },

      // ── Q7 · TF ──────────────────────────────────────────────
      {
        type: "tf",
        context: CTX2,
        question: "Le laplacien $\\Delta V$ pour $r < R$ vaut $-\\rho/\\varepsilon_0$, vérifiant ainsi l'équation de Poisson.",
        answer: "true",
        explanation: "Pour $r < R$ : $\\Delta V = \\frac{1}{r^2}\\frac{d}{dr}\\!\\left(r^2\\frac{dV}{dr}\\right) = \\frac{1}{r^2}\\frac{d}{dr}\\!\\left(r^2 \\cdot (-\\frac{\\rho r}{3\\varepsilon_0})\\right) = \\frac{1}{r^2}\\frac{d}{dr}\\!\\left(-\\frac{\\rho r^3}{3\\varepsilon_0}\\right) = \\frac{1}{r^2}\\cdot(-\\frac{\\rho r^2}{\\varepsilon_0}) = -\\frac{\\rho}{\\varepsilon_0}$. L'équation de Poisson $\\Delta V = -\\rho/\\varepsilon_0$ est bien vérifiée."
      },

      // ── Q8 · TF ──────────────────────────────────────────────
      {
        type: "tf",
        context: CTX2,
        question: "La divergence de $\\vec{E}$ est nulle à l'extérieur de la sphère ($r > R$).",
        answer: "true",
        explanation: "Pour $r > R$, $\\rho = 0$ donc l'équation de Maxwell-Gauss donne $\\vec{\\nabla}\\cdot\\vec{E} = \\rho/\\varepsilon_0 = 0$. On peut le vérifier directement : $\\vec{\\nabla}\\cdot\\!\\left(\\frac{A}{r^2}\\hat{u}_r\\right) = \\frac{1}{r^2}\\frac{d}{dr}(r^2\\cdot\\frac{A}{r^2}) = \\frac{1}{r^2}\\frac{dA}{dr} = 0$ puisque $A = \\rho R^3/(3\\varepsilon_0)$ est une constante."
      },

    ];

    QuizEngine.loadQuiz("td1_ex5", questions, `md:
## Exercice 5 — Potentiel et champ électrostatique

**Partie 1 :** $V(z)$ linéaire par morceaux (modèle de condensateur plan).
Laplacien, $\\vec{E} = -\\vec{\\nabla}V$, divergence, rotationnel, symétries.

**Partie 2 :** $V(r)$ sphérique (sphère uniformément chargée, $\\rho = $ cte).
Laplacien, $\\vec{E}$, divergence, vérification de l'équation de Poisson.
`, { setsFile: 'config/token_sets.json', normFile: 'config/norm_rules.json' });
  </script>
